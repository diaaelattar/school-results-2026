<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — بوابة المدارس 2026</title>
<style>
  :root{--green:#1D9E75;--green-l:#E1F5EE;--green-d:#0F6E56;--red:#E24B4A;--red-l:#FCEBEB;--border:#D3D1C7;--text:#2C2C2A;--muted:#5F5E5A;--white:#fff;--shadow:0 4px 18px rgba(0,0,0,.1)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Cairo',Tahoma,sans-serif;background:linear-gradient(145deg,#0F6E56 0%,#1D9E75 50%,#E1F5EE 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;direction:rtl}
  .box{background:var(--white);border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:440px;box-shadow:var(--shadow)}
  .logo{text-align:center;margin-bottom:1.8rem}
  .logo .icon{font-size:3rem;display:block;margin-bottom:.4rem}
  .logo h1{font-size:1.4rem;color:var(--green-d);margin-bottom:.2rem}
  .logo p{color:var(--muted);font-size:.85rem}
  label{display:block;font-size:.85rem;font-weight:600;margin-bottom:.4rem;color:var(--text)}
  .field{margin-bottom:1.1rem}
  select,input[type=password]{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.95rem;font-family:inherit;background:var(--white);transition:border .2s}
  select:focus,input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
  select.err,input.err{border-color:var(--red)!important}
  .emsg{color:var(--red);font-size:.78rem;margin-top:.3rem;display:none}
  .emsg.on{display:block}
  .alert{padding:.85rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.85rem;display:none;align-items:center;gap:.6rem}
  .alert.on{display:flex}
  .alert.err{background:var(--red-l);color:#7B1D1D;border:1px solid #F7C1C1}
  .alert.warn{background:#FAEEDA;color:#7F4900;border:1px solid #FAC775}
  .btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
  .btn:hover{background:var(--green-d)}
  .btn:disabled{background:#aaa;cursor:not-allowed}
  .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;display:none}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hint{text-align:center;margin-top:1.2rem;font-size:.8rem;color:var(--muted)}
  .hint a{color:var(--green);text-decoration:none}
  .divider{display:flex;align-items:center;gap:.6rem;margin:.9rem 0;color:var(--muted);font-size:.78rem}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <span class="icon">🏫</span>
    <h1>بوابة رفع نتائج المدارس</h1>
    <p>إدارة العمرانية التعليمية — 2025/2026</p>
  </div>

  <div id="gerr" class="alert err"><span>⚠️</span><span id="gerr-msg"></span></div>
  <div id="first-warn" class="alert warn"><span>🔑</span><span>أول تسجيل دخول — كلمة المرور الافتراضية هي كود مدرستك. يُنصح بتغييرها بعد الدخول.</span></div>

  <div class="field">
    <label>اسم المدرسة <span style="color:#E24B4A">*</span></label>
    <select id="school_id">
      <option value="">— اختر مدرستك من القائمة —</option>
    </select>
    <div class="emsg" id="e_school">يرجى اختيار المدرسة</div>
  </div>

  <div class="field">
    <label>كلمة المرور <span style="color:#E24B4A">*</span> <span style="font-weight:400;color:var(--muted)">(أول دخول: كود المدرسة)</span></label>
    <input type="password" id="password" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter')login()" />
    <div class="emsg" id="e_pwd">كلمة المرور مطلوبة</div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">
    <span class="spin" id="spin"></span>
    <span id="btxt">🔓 تسجيل الدخول</span>
  </button>

  <div class="hint">مشكلة في الدخول؟ تواصل مع <a href="admin.html">الإدارة</a></div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6t3Khu9_NDYrO4qNkpkcsu__Oizd3LXrSr4gfWwWr5nibBh_4vzQo430icz-AgvhYfg/exec';
var schools = [];

// إذا كان الطالب سجل دخوله من قبل، ننقله مباشرة للفورم
if (sessionStorage.getItem('school_id')) {
  window.location.href = 'form.html';
}

async function init() {
  var r = await fetch('schools.json');
  schools = await r.json();
  var sel = document.getElementById('school_id');
  schools.forEach(function(s) {
    var o = document.createElement('option');
    o.value = s.id;
    o.textContent = s.name + ' (' + s.type + ')';
    sel.appendChild(o);
  });
}

async function login() {
  var id  = document.getElementById('school_id').value;
  var pwd = document.getElementById('password').value.trim();
  var ok  = true;

  document.getElementById('e_school').classList.remove('on');
  document.getElementById('e_pwd').classList.remove('on');
  document.getElementById('gerr').classList.remove('on');

  if (!id)  { document.getElementById('e_school').classList.add('on'); ok = false; }
  if (!pwd) { document.getElementById('e_pwd').classList.add('on'); ok = false; }
  if (!ok) return;

  var btn  = document.getElementById('loginBtn');
  var spin = document.getElementById('spin');
  var btxt = document.getElementById('btxt');
  btn.disabled = true; spin.style.display = 'inline-block'; btxt.textContent = 'جارٍ التحقق…';

  try {
    var res  = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'login', school_id: id, password: pwd }) });
    var json = await res.json();

    if (json.success) {
      var school = schools.find(function(s){ return s.id === id; });
      sessionStorage.setItem('school_id',   id);
      sessionStorage.setItem('school_name', school.name);
      sessionStorage.setItem('school_type', school.type);
      sessionStorage.setItem('password',    pwd);
      if (json.firstLogin) document.getElementById('first-warn').classList.add('on');
      setTimeout(function(){ window.location.href = 'form.html'; }, json.firstLogin ? 2500 : 300);
    } else {
      document.getElementById('gerr-msg').textContent = json.error || 'فشل تسجيل الدخول';
      document.getElementById('gerr').classList.add('on');
      btn.disabled = false; spin.style.display = 'none'; btxt.textContent = '🔓 تسجيل الدخول';
    }
  } catch (e) {
    document.getElementById('gerr-msg').textContent = 'خطأ في الاتصال، حاول مرة أخرى';
    document.getElementById('gerr').classList.add('on');
    btn.disabled = false; spin.style.display = 'none'; btxt.textContent = '🔓 تسجيل الدخول';
  }
}

init();
</script>
</body>
</html>
