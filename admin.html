<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة — نتائج المدارس 2026</title>
<style>
  :root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--amber:#BA7517;--amber-light:#FAEEDA;--red:#E24B4A;--red-light:#FCEBEB;--gray:#F1EFE8;--border:#D3D1C7;--text:#2C2C2A;--muted:#5F5E5A;--white:#fff;--shadow:0 2px 10px rgba(0,0,0,0.07)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Cairo',Tahoma,Arial,sans-serif;background:#f0f4f0;min-height:100vh;color:var(--text)}
  .topbar{background:var(--green-dark);color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .topbar h1{font-size:1rem}
  .topbar a{color:#9FE1CB;font-size:.82rem;text-decoration:none}
  .topbar a:hover{color:#fff}
  .main{max-width:960px;margin:0 auto;padding:1.4rem 1rem}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1.4rem}
  .stat{background:var(--white);border-radius:10px;padding:.9rem 1rem;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--green)}
  .stat .num{font-size:1.7rem;font-weight:700;color:var(--green-dark)}
  .stat .lbl{font-size:.72rem;color:var(--muted);margin-top:.2rem}
  .card{background:var(--white);border-radius:12px;padding:1.2rem 1.3rem;box-shadow:var(--shadow);margin-bottom:1rem;border:1px solid var(--border)}
  .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem}
  .ch h2{font-size:.95rem;color:var(--green-dark)}
  .tools{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  #filter{padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:.85rem;min-width:180px}
  .btn-exp{padding:7px 14px;background:var(--amber-light);color:var(--amber);border:1px solid #FAC775;border-radius:7px;cursor:pointer;font-size:.82rem;font-family:inherit;font-weight:600}
  .btn-exp:hover{background:#FAC775}
  .btn-ref{padding:7px 12px;background:var(--green-light);color:var(--green-dark);border:1px solid #9FE1CB;border-radius:7px;cursor:pointer;font-size:.82rem;font-family:inherit;font-weight:600}
  .btn-ref:hover{background:#9FE1CB}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:640px}
  th{background:var(--green-dark);color:#fff;padding:8px 9px;text-align:center;font-weight:600;white-space:nowrap}
  td{padding:7px 9px;text-align:center;border-bottom:1px solid var(--gray)}
  tr:hover td{background:var(--green-light)}
  .tot td{background:var(--green-light)!important;font-weight:700;color:var(--green-dark);border-top:2px solid var(--green)}
  .del{background:none;border:none;cursor:pointer;color:var(--red);font-size:.95rem;padding:2px 5px;border-radius:4px}
  .del:hover{background:var(--red-light)}
  .loading{text-align:center;padding:3rem;color:var(--muted);font-size:1rem}
  .empty{text-align:center;padding:2.5rem;color:var(--muted)}
  .pass-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1rem}
  .pass-wrap h2{font-size:1.1rem;color:var(--green-dark)}
  .pass-wrap input{padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;text-align:center;width:260px}
  .pass-wrap button{padding:10px 24px;background:var(--green);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer}
  .pass-wrap .err{color:var(--red);font-size:.85rem;display:none}
  .pass-wrap .err.on{display:block}
</style>
</head>
<body>

<!-- شاشة كلمة المرور -->
<div id="pass-screen" class="pass-wrap">
  <div style="font-size:2.5rem">🔐</div>
  <h2>لوحة إدارة نتائج المدارس 2026</h2>
  <p style="color:var(--muted);font-size:.85rem">أدخل كلمة المرور للدخول</p>
  <input type="password" id="pwd" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')checkPass()" />
  <div class="err" id="perr">كلمة المرور غير صحيحة</div>
  <button onclick="checkPass()">دخول ←</button>
</div>

<!-- لوحة الإدارة — مخفية حتى تُدخل كلمة المرور -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <h1>📊 لوحة إدارة نتائج المدارس 2026</h1>
    <a href="index.html">← صفحة رفع البيانات</a>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="num" id="s_cnt">—</div><div class="lbl">مدارس مسجّلة</div></div>
      <div class="stat"><div class="num" id="s_g1t">—</div><div class="lbl">إجمالي الصف الأول</div></div>
      <div class="stat"><div class="num" id="s_g1p">—</div><div class="lbl">ناجحو الصف الأول</div></div>
      <div class="stat"><div class="num" id="s_g2t">—</div><div class="lbl">إجمالي الصف الثاني</div></div>
      <div class="stat"><div class="num" id="s_g2p">—</div><div class="lbl">ناجحو الصف الثاني</div></div>
    </div>
    <div class="card">
      <div class="ch">
        <h2>📋 بيانات المدارس</h2>
        <div class="tools">
          <input id="filter" placeholder="🔍 بحث..." oninput="filterTbl()" />
          <button class="btn-ref" onclick="loadData()">🔄 تحديث</button>
          <button class="btn-exp" onclick="exportCSV()">⬇ تصدير CSV</button>
        </div>
      </div>
      <div id="tbl-wrap" class="tbl-wrap"><div class="loading">⏳ جارٍ التحميل...</div></div>
    </div>
  </div>
</div>

<script>
// ← نفس رابط الـ Apps Script
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6t3Khu9_NDYrO4qNkpkcsu__Oizd3LXrSr4gfWwWr5nibBh_4vzQo430icz-AgvhYfg/exec';

// كلمة مرور بسيطة من جهة المتصفح — الحماية الحقيقية من جهة الـ Sheet
var ADMIN_PASS = 'admin2026';

var allData = [];

function checkPass(){
  var p = document.getElementById('pwd').value;
  if(p === ADMIN_PASS){
    document.getElementById('pass-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadData();
  } else {
    document.getElementById('perr').classList.add('on');
  }
}

async function loadData(){
  document.getElementById('tbl-wrap').innerHTML='<div class="loading">⏳ جارٍ التحميل...</div>';
  try{
    var res = await fetch(SCRIPT_URL);
    var json = await res.json();
    allData = json.data || [];
    renderStats();
    filterTbl();
  } catch(e){
    document.getElementById('tbl-wrap').innerHTML='<div class="empty">❌ خطأ في تحميل البيانات</div>';
  }
}

function renderStats(){
  var t=function(k){return allData.reduce(function(s,r){return s+Number(r[k]||0);},0);};
  document.getElementById('s_cnt').textContent=allData.length;
  document.getElementById('s_g1t').textContent=t('g1_total').toLocaleString();
  document.getElementById('s_g1p').textContent=t('g1_passed').toLocaleString();
  document.getElementById('s_g2t').textContent=t('g2_total').toLocaleString();
  document.getElementById('s_g2p').textContent=t('g2_passed').toLocaleString();
}

function filterTbl(){
  var q=document.getElementById('filter').value.toLowerCase();
  var d=allData.filter(function(r){return r.school_name.toLowerCase().includes(q);});
  renderTbl(d);
}

function renderTbl(data){
  var wrap=document.getElementById('tbl-wrap');
  if(data.length===0){wrap.innerHTML='<div class="empty">لا توجد بيانات</div>';return;}
  var t=function(k){return data.reduce(function(s,r){return s+Number(r[k]||0);},0);};
  var rows=data.map(function(r,i){
    var dt=r.submitted_at?new Date(r.submitted_at).toLocaleDateString('ar-EG'):'—';
    return '<tr><td>'+(i+1)+'</td><td style="text-align:right;font-weight:600">'+r.school_name+'</td><td>'+r.g1_total+'</td><td>'+r.g1_passed+'</td><td>'+r.g1_remedial+'</td><td>'+r.g2_total+'</td><td>'+r.g2_passed+'</td><td>'+r.g2_remedial+'</td><td>'+dt+'</td></tr>';
  }).join('');
  wrap.innerHTML='<table><thead><tr><th>#</th><th>المدرسة</th><th colspan="3">الصف الأول</th><th colspan="3">الصف الثاني</th><th>التاريخ</th></tr><tr><th></th><th></th><th>إجمالي</th><th>ناجح</th><th>علاجي</th><th>إجمالي</th><th>ناجح</th><th>علاجي</th><th></th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr class="tot"><td colspan="2">الإجمالي الكلي ('+data.length+' مدرسة)</td><td>'+t('g1_total')+'</td><td>'+t('g1_passed')+'</td><td>'+t('g1_remedial')+'</td><td>'+t('g2_total')+'</td><td>'+t('g2_passed')+'</td><td>'+t('g2_remedial')+'</td><td></td></tr></tfoot></table>';
}

function exportCSV(){
  var h='\uFEFFاسم المدرسة,إجمالي أول,ناجح أول,علاجي أول,إجمالي ثاني,ناجح ثاني,علاجي ثاني,تاريخ الرفع';
  var rows=allData.map(function(r){return r.school_name+','+r.g1_total+','+r.g1_passed+','+r.g1_remedial+','+r.g2_total+','+r.g2_passed+','+r.g2_remedial+','+(r.submitted_at?new Date(r.submitted_at).toLocaleDateString('ar-EG'):'');});
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([h].concat(rows).join('\n'));
  a.download='نتائج_المدارس_2026.csv';a.click();
}
</script>
</body>
</html>
